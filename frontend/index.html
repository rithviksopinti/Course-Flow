<!DOCTYPE html>
<html>
<head>
    <title>CourseFlow</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; margin: 0; }

        .center { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }

        button { padding: 10px; margin: 10px; width: 100%; cursor: pointer; }

        nav { background: black; color: white; padding: 15px; display: flex; justify-content: space-between; }

        .hidden { display: none; }

        .container { padding: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, 300px); gap: 20px; }

        .course { background: white; padding: 10px; border-radius: 10px; }

        iframe { width: 100%; height: 200px; }
    </style>
</head>
<body>

<!-- ROLE SELECT -->
<div id="role-page" class="center">
    <div class="card">
        <h2>Select Role</h2>
        <button onclick="selectRole('creator')">Creator</button>
        <button onclick="selectRole('learner')">Learner</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
    <nav>
        <span>CourseFlow</span>
        <span onclick="resetRole()">Change Role</span>
    </nav>

    <div class="container">
        <div id="create-section" class="hidden">
            <h2>Create Course</h2>
            <input id="title" placeholder="Title"><br><br>
            <input id="video" placeholder="YouTube URL"><br><br>
            <input id="desc" placeholder="Description"><br><br>
            <button onclick="publish()">Publish</button>
        </div>

        <h2>Courses</h2>
        <div id="courses" class="grid"></div>
    </div>
</div>

<script>
let role = null;

// ✅ YOUR BACKEND URL
const API = "https://course-flow-33ox.onrender.com";

// ROLE SELECT
function selectRole(r) {
    localStorage.setItem("role", r);
    role = r;

    document.getElementById("role-page").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");

    setupUI();
    loadCourses();
}

// LOAD EXISTING ROLE
const saved = localStorage.getItem("role");
if (saved) {
    role = saved;
    document.getElementById("role-page").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");

    setupUI();
    loadCourses();
}

// UI CONTROL
function setupUI() {
    if (role === "creator") {
        document.getElementById("create-section").classList.remove("hidden");
    }
}

// RESET ROLE
function resetRole() {
    localStorage.removeItem("role");
    location.reload();
}

// LOAD COURSES
async function loadCourses() {
    try {
        const res = await fetch(API + "/api/courses");
        const data = await res.json();

        const container = document.getElementById("courses");
        container.innerHTML = "";

        data.forEach(c => {
            const embed = c.video_url.replace("watch?v=", "embed/");

            container.innerHTML += `
                <div class="course">
                    <iframe src="${embed}"></iframe>
                    <h3>${c.title}</h3>
                    <p>${c.description}</p>
                    ${role === "creator" ? `<button onclick="deleteCourse('${c._id}')">Delete</button>` : ""}
                </div>
            `;
        });

    } catch (err) {
        console.error("Error loading courses:", err);
    }
}

// CREATE
async function publish() {
    const title = document.getElementById("title").value;
    const video = document.getElementById("video").value;
    const desc = document.getElementById("desc").value;

    await fetch(API + "/api/courses", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, video_url: video, description: desc })
    });

    loadCourses();
}

// DELETE
async function deleteCourse(id) {
    await fetch(API + "/api/courses/" + id, {
        method: "DELETE"
    });

    loadCourses();
}
</script>

</body>
</html>
